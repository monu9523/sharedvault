version: '3.8'

services:
  securevault:
    build: .
    container_name: securevault
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./vault-single-user.html:/app/vault-single-user.html:ro
      - ./manifest.json:/app/manifest.json:ro
      - ./sw.js:/app/sw.js:ro
    networks:
      - securevault-network

networks:
  securevault-network:
    driver: bridge
